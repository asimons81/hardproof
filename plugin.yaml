name: hardproof
version: 0.1.0
description: Persistent, risk-aware engineering protocol with durable verification evidence.
author: Hardproof contributors
kind: workflow
provides_tools:
  - hardproof_run
  - hardproof_record
  - hardproof_task
  - hardproof_transition
  - hardproof_verify
  - hardproof_report
provides_hooks:
  - pre_llm_call
  - pre_tool_call
  - post_tool_call
  - pre_verify
  - on_session_start
  - on_session_finalize
  - on_session_reset
