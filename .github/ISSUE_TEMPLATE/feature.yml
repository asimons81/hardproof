name: Feature request
description: Propose an evidence-backed Hardproof improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What engineering workflow problem is not currently solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Required outcome
      description: Describe observable behavior, risks, and compatibility needs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain smaller or reversible alternatives.
