name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
  workflow_dispatch:

env:
  PIP_CONSTRAINT: constraints/ci.txt
  PIP_BUILD_CONSTRAINT: constraints/ci.txt

permissions:
  contents: read

jobs:
  quality:
    name: Ruff, mypy, and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt
      - run: python -m pip install --upgrade "pip==26.1.2"
      - run: python -m pip install -e ".[dev]"
      - name: Environment diagnostics
        run: |
          python -VV
          python -m pip --version
          python -m pytest --version
          python -m pip freeze --all
      - name: Build (wheel contract tests need dist/)
        run: python -m build
      - name: Ruff
        run: python -m ruff check hardproof tests scripts
      - name: mypy
        run: python -m mypy hardproof
      - name: Coverage
        run: python -m pytest --cov=hardproof --cov-report=xml --cov-report=term-missing --cov-fail-under=90
      - name: Critical module coverage
        run: >-
          python -m pytest
          tests/unit/test_domain_transitions.py tests/unit/test_stage_rules.py
          tests/unit/test_stage_graph.py tests/unit/test_policy_engine.py tests/unit/test_commands.py
          tests/unit/test_run_service.py tests/unit/test_tool_policy.py
          tests/unit/test_tool_policy_hook.py tests/unit/test_approval_service.py
          tests/unit/test_database.py tests/unit/test_evidence_service.py
          tests/unit/test_terminal_result_parser.py tests/unit/test_snapshots.py
          tests/unit/test_verification_hook.py
          --cov=hardproof.policy.stage_rules
          --cov=hardproof.policy.stage_graph
          --cov=hardproof.policy.tool_rules
          --cov=hardproof.services.approvals
          --cov=hardproof.storage.migrations
          --cov=hardproof.services.evidence
          --cov-report=term-missing --cov-fail-under=95
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: macos-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt
      - run: python -m pip install --upgrade "pip==26.1.2"
      - run: python -m pip install -e ".[dev]"
      - name: Environment diagnostics
        run: |
          python -VV
          python -m pip --version
          python -m pytest --version
          python -m pip freeze --all
      - name: Build (wheel contract tests need dist/)
        run: python -m build
      - name: Unit, integration, contract, and e2e tests
        run: python -m pytest

  package:
    name: Build, package-data, license, smoke, and pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt
      - run: python -m pip install --upgrade "pip==26.1.2"
      - run: python -m pip install -e ".[dev]"
      - name: Environment diagnostics
        run: |
          python -VV
          python -m pip --version
          python -m pytest --version
          python -m pip freeze --all
      - name: Build wheel and sdist
        run: python -m build
      - run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Package-data contract
        run: python -m pytest tests/contract/test_package_contract.py tests/contract/test_skills.py tests/contract/test_templates.py
      - name: License file check
        run: python -m pytest tests/contract/test_open_source_surface.py::test_license_is_full_apache_2_text
      - name: Clean wheel installation smoke
        run: python scripts/smoke_install.py dist/hardproof-*.whl
      - name: pip-audit
        run: python -m pip_audit . --strict
      - name: Build SBOM and checksums
        run: python scripts/build_sbom.py dist
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.json
            dist/SHA256SUMS
