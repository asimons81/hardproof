name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Verify, build, attest, release, and publish
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Configure SSH signing verification
        run: |
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/.github/release-signers"
      - name: Fetch tag object for verification
        run: git fetch origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" --no-tags
      - name: Verify signed tag
        run: git tag -v "${GITHUB_REF_NAME}"
      - name: Verify commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag matches package and manifest version
        run: |
          python - <<'PY'
          import pathlib, tomllib, yaml, hardproof, os
          version = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version']
          manifest = yaml.safe_load(pathlib.Path('plugin.yaml').read_text())['version']
          tag = os.environ['GITHUB_REF_NAME'].removeprefix('v')
          assert tag == version == str(manifest) == hardproof.__version__
          PY
      - run: python -m pytest
      - run: python -m ruff check hardproof tests scripts
      - run: python -m mypy hardproof
      - run: python -m build
      - run: python -m twine check dist/*.whl dist/*.tar.gz
      - run: python scripts/smoke_install.py dist/hardproof-*.whl
      - name: Generate CycloneDX SBOM and SHA256 checksums
        run: python scripts/build_sbom.py dist
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.json
            dist/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.json
            dist/SHA256SUMS
          generate_release_notes: true
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
